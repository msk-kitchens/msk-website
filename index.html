<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأسلوب العصري | لتفصيل المطابخ والديكور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #c29b40; /* لون ذهبي عصري */
            --dark: #1a1a1a;
            --light: #f4f4f4;
            --whatsapp: #25d366;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--light); margin: 0; color: var(--dark); line-height: 1.6; }

        /* الهيدر */
        header { background: var(--dark); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        .logo-text { font-size: 2rem; font-weight: bold; letter-spacing: 2px; }

        /* قسم الأزرار الاجتماعية والتواصل */
        .social-buttons { padding: 40px 10px; text-align: center; background: white; }
        .btn-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        
        .social-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 15px; border-radius: 10px; text-decoration: none; color: white; font-weight: bold; transition: 0.3s;
        }
        .social-btn:hover { transform: scale(1.05); }

        .tiktok { background: #000000; }
        .insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .website { background: var(--primary); }
        .wa-catalog { background: #075e54; }
        .contact-now { background: var(--whatsapp); grid-column: 1 / -1; margin-top: 10px; font-size: 1.2rem; }

        /* قسم الكتالوج المبسط */
        .simple-catalog { padding: 50px 5%; text-align: center; }
        .item { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        footer { background: var(--dark); color: white; text-align: center; padding: 20px; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">الأسلوب العصري</div>
        <p>لتفصيل المطابخ، خزائن الملابس، والديكور</p>
    </header>

    <section class="social-buttons">
        <h2 style="margin-bottom: 30px;">تواصل معنا عبر منصاتنا</h2>
        <div class="btn-container">
            <a href="https://www.tiktok.com/@YOUR_USER" class="social-btn tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> تيك توك
            </a>

            <a href="https://www.instagram.com/YOUR_USER" class="social-btn insta" target="_blank">
                <i class="fab fa-instagram"></i> انستقرام
            </a>

            <a href="http://www.yourwebsite.com" class="social-btn website">
                <i class="fas fa-globe"></i> موقعنا الإلكتروني
            </a>

            <a href="https://wa.me/c/9665XXXXXXXX" class="social-btn wa-catalog" target="_blank">
                <i class="fas fa-book-open"></i> كتالوج الأعمال
            </a>

            <a href="https://wa.me/9665XXXXXXXX?text=السلام%20عليكم،%20دخلت%20على%20موقع%20الأسلوب%20العصري%20وحابب%20أستفسر%20عن%20(تفصيل%20مطبخ%20/%20خزانة%20ملابس%20/%20ديكور)" class="social-btn contact-now">
                <i class="fab fa-whatsapp"></i> استفسر الآن (رسالة مباشرة)
            </a>
        </div>
    </section>

    <section class="simple-catalog">
        <h2>خدماتنا المميزة</h2>
        <div style="display: flex; flex-wrap: wrap; justify-content: center;">
            <div class="item"><h3>تفصيل مطابخ</h3></div>
            <div class="item"><h3>خزائن ملابس</h3></div>
            <div class="item"><h3>ديكورات خشبية</h3></div>
        </div>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة لـ الأسلوب العصري &copy; 2026</p>
    </footer>

</body>
</html>
