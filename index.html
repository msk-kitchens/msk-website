<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاسلوب العصري | Modern Kitchens</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo', sans-serif;
background:#f8f8f8;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px;
background:#000;
color:#fff;
}

nav span{
cursor:pointer;
}

/* HERO */
.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1556912173-3bb406ef7e77') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.section h2{
font-size:35px;
margin-bottom:20px;
}

/* PROCESS */
.process{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.step{
background:#fff;
padding:20px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
padding:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
}

/* PAYMENT */
.payment{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.pay-box{
background:#000;
color:#fff;
padding:30px;
width:150px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:#fff;
padding:15px 20px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

/* LANG */
.lang{
position:fixed;
top:20px;
left:20px;
background:#fff;
padding:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="lang" onclick="toggleLang()">EN</div>

<nav>
<div>الاسلوب العصري</div>
<div>Modern Kitchens</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1 id="title">مطابخ مصممة خصيصًا لك</h1>
<p id="desc">نحول فكرتك إلى واقع بأعلى جودة</p>
</div>
</section>

<!-- PROCESS -->
<section class="section">
<h2 id="processTitle">خطوات العمل</h2>

<div class="process">
<div class="step" id="s1">استشارة</div>
<div class="step" id="s2">تصميم</div>
<div class="step" id="s3">تنفيذ</div>
<div class="step" id="s4">تركيب</div>
</div>
</section>

<!-- GALLERY -->
<section class="section">
<h2 id="galleryTitle">أعمالنا</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<img src="https://images.unsplash.com/photo-1560185007-cde436f6a4d0">
<img src="https://images.unsplash.com/photo-1556911220-bff31c812dba">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
</div>
</section>

<!-- PAYMENT -->
<section class="section">
<h2 id="paymentTitle">نظام الدفع</h2>

<div class="payment">
<div class="pay-box">60%</div>
<div class="pay-box">20%</div>
<div class="pay-box">20%</div>
</div>
</section>

<!-- CONTACT -->
<section class="section">
<h2 id="contactTitle">اطلب عرض سعر الآن</h2>
<p id="contactDesc">تواصل معنا مباشرة عبر واتساب</p>
</section>

<a class="whatsapp" href="https://wa.me/966540220939" target="_blank">
واتساب
</a>

<script>
let lang = "ar";

function toggleLang(){
if(lang === "ar"){
document.documentElement.lang = "en";
document.documentElement.dir = "ltr";

document.getElementById("title").innerText = "Custom Kitchens Built For You";
document.getElementById("desc").innerText = "We turn your idea into reality with top quality";

document.getElementById("processTitle").innerText = "Our Process";
document.getElementById("s1").innerText = "Consultation";
document.getElementById("s2").innerText = "Design";
document.getElementById("s3").innerText = "Execution";
document.getElementById("s4").innerText = "Installation";

document.getElementById("galleryTitle").innerText = "Our Work";
document.getElementById("paymentTitle").innerText = "Payment Plan";

document.getElementById("contactTitle").innerText = "Get a Quote Now";
document.getElementById("contactDesc").innerText = "Contact us via WhatsApp";

document.querySelector(".lang").innerText = "AR";

lang = "en";
}else{

document.documentElement.lang = "ar";
document.documentElement.dir = "rtl";

document.getElementById("title").innerText = "مطابخ مصممة خصيصًا لك";
document.getElementById("desc").innerText = "نحول فكرتك إلى واقع بأعلى جودة";

document.getElementById("processTitle").innerText = "خطوات العمل";
document.getElementById("s1").innerText = "استشارة";
document.getElementById("s2").innerText = "تصميم";
document.getElementById("s3").innerText = "تنفيذ";
document.getElementById("s4").innerText = "تركيب";

document.getElementById("galleryTitle").innerText = "أعمالنا";
document.getElementById("paymentTitle").innerText = "نظام الدفع";

document.getElementById("contactTitle").innerText = "اطلب عرض سعر الآن";
document.getElementById("contactDesc").innerText = "تواصل معنا مباشرة عبر واتساب";

document.querySelector(".lang").innerText = "EN";

lang = "ar";
}
}
</script>

</body>
</html>
