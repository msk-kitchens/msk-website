<title>الأسلوب العصري - مطابخ ودريسنج</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

:root{
--gold:#c5a367;
--dark:#000;
--card:#0a0a0a;
--border:rgba(197,163,103,.3);
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#000;
color:#fff;
}

/* HEADER */
header{
position:sticky;top:0;
background:rgba(0,0,0,.9);
padding:15px;
text-align:center;
border-bottom:1px solid var(--border);
}
header h1{color:var(--gold);margin:0}

/* HERO */
.hero{
padding:120px 20px;
text-align:center;
background:radial-gradient(circle,#1a1a1a,#000);
}
.hero h1{
font-size:90px;
color:var(--gold);
margin:0;
}
.hero h2{margin:10px 0}
.hero p{color:#aaa;max-width:600px;margin:auto}

/* BUTTON */
.btn{
background:var(--gold);
color:#000;
padding:15px 35px;
display:inline-block;
margin-top:25px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}
.btn:hover{transform:scale(1.05);background:#fff}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

/* CARD */
.card{
background:var(--card);
border:1px solid var(--border);
overflow:hidden;
transition:.3s;
}
.card:hover{transform:translateY(-5px)}
.card img{
width:100%;
height:260px;
object-fit:cover;
}
.card h3{
padding:12px;
color:var(--gold);
text-align:center;
}

/* CTA SECTION */
.cta{
text-align:center;
padding:60px 20px;
background:#050505;
border-top:1px solid var(--border);
}
.cta p{color:#aaa}

/* MAP */
iframe{width:100%;border:none}

/* WHATSAPP FLOAT */
.wa{
position:fixed;
bottom:20px;
left:20px;
background:#25d366;
padding:15px;
border-radius:50%;
font-size:22px;
color:#fff;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

footer{
text-align:center;
padding:20px;
background:#000;
color:#777;
}

/* MOBILE */
@media(max-width:600px){
.hero h1{font-size:55px}
}

</style>
</head>
