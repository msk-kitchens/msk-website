<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأسلوب العصري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
padding:15px;
text-align:center;
border-bottom:1px solid #333;
}
header h1{
color:#d4af37;
font-weight:700;
}

/* HERO */
.hero{
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
padding:120px 20px;
text-align:center;
}
.hero h2{
font-size:40px;
background:rgba(0,0,0,0.6);
display:inline-block;
padding:10px 20px;
border-radius:10px;
}

/* SECTION */
section{padding:40px 20px}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#111;
border-radius:12px;
overflow:hidden;
transition:.3s;
}
.card:hover{transform:scale(1.05)}
.card img{
width:100%;
height:250px;
object-fit:cover;
}
.card h3{
padding:10px;
color:#d4af37;
}

/* GALLERY FIX */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}
.gallery img{
width:100%;
border-radius:10px;
}

/* FEATURES */
.features .card{
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
gap:10px;
}

/* MAP */
iframe{
width:100%;
border:none;
border-radius:10px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:#fff;
padding:12px 18px;
border-radius:50px;
text-decoration:none;
font-size:14px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* MOBILE FIX */
@media(max-width:600px){
.gallery{
grid-template-columns:repeat(2,1fr);
}
}

footer{
text-align:center;
padding:20px;
background:#000;
color:#aaa;
}

</style>
</head>

<body>

<header>
<h1>الأسلوب العصري</h1>
</header>

<section class="hero">
<h2>اهلاً بك في الأسلوب العصري</h2>
<p>تصاميم أوروبية - جودة عالية - تنفيذ سريع</p>
</section>

<!-- الكتالوج -->
<section>
<h2 style="text-align:center;color:#d4af37;">الكتالوج</h2>

<div class="products">

<div class="card">
<img loading="lazy" src="https://images.unsplash.com/photo-1588854337221-4cf9fa96059c">
<h3>لون داكن فاخر</h3>
</div>

<div class="card">
<img loading="lazy" src="https://images.unsplash.com/photo-1598300053653-58b8e7b61b87">
<h3>بني مودرن</h3>
</div>

<div class="card">
<img loading="lazy" src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
<h3>خشب طبيعي</h3>
</div>

</div>
</section>

<!-- اعمال -->
<section>
<h2 style="text-align:center;color:#d4af37;">أعمالنا</h2>

<div class="gallery">
<img loading="lazy" src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0">
<img loading="lazy" src="https://images.unsplash.com/photo-1600566752355-35792bedcfea">
<img loading="lazy" src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d">
<img loading="lazy" src="https://images.unsplash.com/photo-1600573472550-8090b5e0745e">
</div>
</section>

<!-- المميزات -->
<section class="features">
<h2 style="text-align:center;color:#d4af37;">ليه تختارنا؟</h2>

<div class="products">

<div class="card">🛠 خامات أوروبية</div>
<div class="card">🎨 تصميم عصري</div>
<div class="card">💰 أسعار منافسة</div>
<div class="card">⏱ تنفيذ سريع</div>

</div>
</section>

<!-- ماب -->
<section>
<h2 style="text-align:center;color:#d4af37;">موقعنا</h2>

<iframe src="https://maps.google.com/maps?q=جدة&output=embed" height="300"></iframe>
</section>

<!-- واتساب -->
<a class="whatsapp"
href="https://wa.me/966540220939?text=السلام%20عليكم%20الأسلوب%20العصري..%20حابب%20استفسر%20عن%20المطابخ">
اطلب عرض سعر
</a>

<footer>
© جميع الحقوق محفوظة - الأسلوب العصري
</footer>

</body>
</html>
