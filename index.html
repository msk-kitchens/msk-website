<section class="calc" style="background: #050505; border: 1px solid var(--border); border-radius: 15px; padding: 30px;">
    <h2 style="color:var(--gold); text-align: center;">📐 صمم حسب ميزانيتك</h2>
    <p style="text-align: center; color: #777; font-size: 14px;">احصل على سعر تقريبي لمطبخك في ثوانٍ</p>

    <div class="grid" style="gap: 10px;">
        <div>
            <label style="font-size: 12px; color: var(--gold);">الطول الإجمالي (بالمتر)</label>
            <input id="w" type="number" placeholder="مثال: 5">
        </div>
        <div>
            <label style="font-size: 12px; color: var(--gold);">نوع الخشب / الخامة</label>
            <select id="m" onchange="updateInfo()">
                <option value="1800">صاج مطفي (اقتصادي)</option>
                <option value="2800">HPL / أكريليك (متوسط)</option>
                <option value="4500">خشب إيطالي / جولي (فاخر)</option>
            </select>
        </div>
    </div>

    <div id="material-note" style="background: #111; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 13px; color: #ccc; border-right: 3px solid var(--gold);">
        💡 ملاحظة: السعر يشمل الإكسسوارات الأساسية والتركيب.
    </div>

    <button onclick="calc()" style="cursor: pointer; transition: 0.3s;">✨ احسب السعر التقديري</button>

    <div id="result-box" style="display:none; text-align: center; margin-top: 20px; padding: 20px; background: rgba(197, 163, 103, 0.1); border-radius: 10px;">
        <h3 id="res" style="color: var(--gold); margin: 0;"></h3>
        <p style="font-size: 12px; color: #aaa;">هذا السعر تقريبي بناءً على المقاسات المدخلة</p>
        <a id="send" class="btn" style="width: 80%; margin: 10px auto;">📦 أرسل المقاسات للمهندس وتأكد من السعر</a>
    </div>
</section>

<script>
function updateInfo() {
    let m = document.getElementById("m").value;
    let note = document.getElementById("material-note");
    if(m == "1800") note.innerText = "💡 الصاج المطفي: عملي جداً، مقاوم للرطوبة وسعره منافس.";
    if(m == "2800") note.innerText = "💡 HPL/أكريليك: يعطي لمعة وشكل عصري وسهل التنظيف.";
    if(m == "4500") note.innerText = "💡 الفاخر: خامات إيطالية مع ضمان ممتد وتصاميم خاصة.";
}

function calc(){
    let w = document.getElementById("w").value;
    let m = document.getElementById("m").value;
    let mText = document.getElementById("m").options[document.getElementById("m").selectedIndex].text;

    if(!w || w <= 0){
        alert("يرجى إدخال الطول بشكل صحيح");
        return;
    }

    let price = w * m;
    let resBox = document.getElementById("result-box");
    let resText = document.getElementById("res");
    
    resBox.style.display = "block";
    resText.innerText = "التكلفة التقريبية: " + price.toLocaleString() + " ريال";

    let msg = "مرحباً الأسلوب العصري، استخدمت حاسبة الموقع:\n" + 
              "- الطول: " + w + " متر\n" + 
              "- الخامة: " + mText + "\n" + 
              "- السعر الظاهر: " + price + " ريال\n" +
              "محتاج تأكيد السعر وتحديد موعد للمعاينة.";

    let link = "https://wa.me/966540220939?text=" + encodeURIComponent(msg);
    document.getElementById("send").href = link;
}
</script>
